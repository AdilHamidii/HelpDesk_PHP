<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="index.html">HelpDesk</a>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html" class="nav-link active">Accueil</a></li>
                    <li><a href="login.html" class="nav-link">Connexion</a></li>
                    <li><a href="profile.html" class="nav-link">Profil</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <section class="login-section">
            <h1>Connexion</h1>
            <form action="../php/login.php" method="POST" class="login-form">
                <div class="form-group">
                    <label for="email">Utilisateur:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
            </form>
            <h5>Nouveau ? <a href="register.html">Créer un compte</a></h5>
        </section>
    </main>
   

    <script src="../js/script.js"></script>
</body>
</html>
